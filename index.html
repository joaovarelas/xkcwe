<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XKCWE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #f5f0e8;
      --ink: #1a1a1a;
      --faint: #d4cfc6;
      --red: #c0392b;
    }

    html,
    body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Patrick Hand', cursive;
      font-size: 18px;
    }

    body {
      background-image: repeating-linear-gradient(transparent, transparent 31px, var(--faint) 31px, var(--faint) 32px);
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 2rem 6rem;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .site-title {
      font-family: 'Permanent Marker', cursive;
      font-size: 2.8rem;
      line-height: 1;
      display: inline-block;
    }

    .site-title::after {
      content: '';
      display: block;
      height: 4px;
      background: var(--ink);
      border-radius: 2px;
      margin-top: 4px;
      transform: rotate(-0.5deg);
    }

    .site-subtitle {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      opacity: 0.5;
      font-style: italic;
    }

    /* Search */
    .search-area {
      margin-bottom: 2rem;
    }

    .search-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      opacity: 0.65;
    }

    .search-row {
      display: flex;
      gap: 0.6rem;
      align-items: stretch;
    }

    .prefix-wrap {
      display: flex;
      align-items: stretch;
      flex: 1;
    }

    .prefix {
      background: var(--faint);
      border: 2.5px solid var(--ink);
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 0.6rem 0.8rem;
      font-family: 'Permanent Marker', cursive;
      font-size: 1rem;
      display: flex;
      align-items: center;
    }

    #cwe-input {
      flex: 1;
      min-width: 0;
      border: 2.5px solid var(--ink);
      border-radius: 0 4px 4px 0;
      padding: 0.6rem 0.8rem;
      font-family: 'Patrick Hand', cursive;
      font-size: 1.1rem;
      background: #fff;
      outline: none;
    }

    #cwe-input:focus {
      background: #fffef5;
    }

    #search-btn {
      font-family: 'Permanent Marker', cursive;
      font-size: 1rem;
      padding: 0.6rem 1.4rem;
      border: 2.5px solid var(--ink);
      border-radius: 4px 2px 6px 3px / 3px 6px 2px 4px;
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }

    #search-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    #search-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    #search-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .quick-links {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      font-size: 0.82rem;
    }

    .quick-label {
      opacity: 0.5;
      font-style: italic;
    }

    .chip {
      font-family: 'Patrick Hand', cursive;
      font-size: 0.8rem;
      padding: 0.15rem 0.6rem;
      border: 2px solid var(--ink);
      border-radius: 3px 7px 4px 5px / 7px 3px 6px 2px;
      background: var(--paper);
      cursor: pointer;
      transition: background 0.1s;
    }

    .chip-dark {
      font-family: 'Patrick Hand', cursive;
      font-size: 0.8rem;
      color: white;
      padding: 0.15rem 0.6rem;
      border: 2px solid var(--ink);
      border-radius: 3px 7px 4px 5px / 7px 3px 6px 2px;
      background: var(--ink);
      cursor: pointer;
      transition: background 0.1s;
    }

    .chip:hover {
      background: var(--faint);
    }

    /* Panel */
    #result {
      animation: popIn 0.3s ease both;
    }

    .panel {
      border: 3px solid var(--ink);
      border-radius: 3px 9px 5px 7px / 7px 3px 9px 5px;
      background: #fff;
      overflow: hidden;
      box-shadow: 5px 5px 0 var(--ink);
    }

    .panel-caption {
      background: var(--ink);
      color: var(--paper);
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .cwe-id {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.4rem;
      white-space: nowrap;
    }

    .cwe-name {
      font-size: 1rem;
      line-height: 1.35;
      opacity: 0.9;
    }

    .panel-image {
      border-bottom: 3px solid var(--ink);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      padding: 1.2rem;
    }

    .panel-image img {
      max-width: 100%;
      max-height: 340px;
      object-fit: contain;
      display: block;
      filter: contrast(1.05) saturate(0.55);
    }

    .no-img-wrap {
      text-align: center;
      padding: 2rem;
    }

    .no-img-svg {
      width: 110px;
      opacity: 0.2;
      margin: 0 auto 0.6rem;
      display: block;
    }

    .no-img-caption {
      font-size: 0.82rem;
      opacity: 0.45;
      font-style: italic;
      line-height: 1.5;
    }

    .panel-desc {
      padding: 1.2rem 1.5rem 1rem;
    }

    .desc-label {
      font-family: 'Permanent Marker', cursive;
      font-size: 0.75rem;
      opacity: 0.35;
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
    }

    .desc-body {
      font-size: 1rem;
      line-height: 1.7;
    }

    .panel-alt {
      border-top: 2px solid var(--faint);
      padding: 0.6rem 1.5rem 0.9rem;
      font-size: 0.8rem;
      font-style: italic;
      opacity: 0.5;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .panel-alt .meta-right {
      flex: 1;
      text-align: right;
    }

    /* Error */
    #error-msg {
      display: none;
      padding: 1rem 1.4rem;
      border: 2.5px solid var(--red);
      border-radius: 3px 8px 4px 7px / 8px 3px 7px 4px;
      background: #fff5f5;
      color: var(--red);
      box-shadow: 3px 3px 0 var(--red);
      animation: popIn 0.3s ease both;
    }

    /* Loader */
    #loader {
      display: none;
      text-align: center;
      padding: 3rem 0;
      opacity: 0.45;
      font-style: italic;
      font-size: 0.9rem;
    }

    .pencil {
      display: inline-block;
      font-size: 2rem;
      animation: wiggle 0.5s ease-in-out infinite alternate;
      margin-bottom: 0.5rem;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.97) translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes wiggle {
      from {
        transform: rotate(-15deg);
      }

      to {
        transform: rotate(15deg);
      }
    }

    @media (max-width: 480px) {
      .site-title {
        font-size: 2rem;
      }

      .search-row {
        flex-direction: column;
      }

      #search-btn {
        width: 100%;
      }

      .prefix-wrap {
        width: 100%;
      }
    }
  </style>


  <script>
    let cweData = [];


    /**
    * Gets a random CWE from the filtered list
    */
    function getRandomCWE() {
      if (cweData.length === 0) return "";

      const randomIndex = Math.floor(Math.random() * cweData.length);
      // Return ONLY the ID (e.g., "770") so lookup() can handle it
      return String(cweData[randomIndex].ID);
    }


    /**
     * Loads and filters CWE data once on page load
     */
    async function loadCWEData() {
      const url = "https://raw.githubusercontent.com/CWE-CAPEC/REST-API-wg/refs/heads/main/json_repo/cwe.json";

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Failed to fetch");

        const data = await response.json();

        // Target the "Weaknesses" array specifically
        const allWeaknesses = data.Weaknesses || [];

        // Filter: Only keep objects that have the "Diagram" property
        cweData = allWeaknesses.filter(cwe =>
          cwe.Diagram && typeof cwe.Diagram === 'string'
        );

        console.log(`Filter complete. Total CWEs with Diagrams: ${cweData.length}`);

        if (cweData.length > 0) {
          lookup(getRandomCWE());
        }


      } catch (error) {
        console.error("Error loading CWE data:", error);
      }
    }



    // Initialize when the page loads
    window.addEventListener('DOMContentLoaded', loadCWEData);


  </script>
</head>

<body>
  <main>

    <header>
      <div class="site-title">xkcwe</div>
      <p class="site-subtitle">(because security is serious, but the diagrams don't have to be)</p>
    </header>

    <div class="search-area">
      <label class="search-label" for="cwe-input">type a weakness id and find out what you're probably doing wrong
        →</label>
      <div class="search-row">
        <div class="prefix-wrap">
          <span class="prefix">CWE-</span>
          <input id="cwe-input" type="text" placeholder="79, 89, 347…" inputmode="numeric" />
        </div>
        <button id="search-btn">Look it up</button>
      </div>
      <div class="quick-links">
        <span class="quick-label">classics:</span>
        <button class="chip" onclick="lookup('770')">770 DoS</button>
        <button class="chip" onclick="lookup('79')">79 XSS</button>
        <button class="chip" onclick="lookup('89')">89 SQLi</button>
        <button class="chip" onclick="lookup('22')">22 Path Traversal</button>
        <button class="chip" onclick="lookup('347')">347 Bad Sig</button>
        <button class="chip" onclick="lookup('502')">502 Deserialisation</button>
        <button class="chip" onclick="lookup('798')">798 Hardcoded Creds</button>

        <button class="chip-dark" onclick="lookup(getRandomCWE())">RANDOM</button>
      </div>
    </div>

    <div id="loader">
      <div class="pencil">✏️</div><br />drawing the diagram…
    </div>
    <div id="error-msg"></div>
    <div id="result"></div>

  </main>
  <script>
    const input = document.getElementById('cwe-input');
    const btn = document.getElementById('search-btn');
    const result = document.getElementById('result');
    const errEl = document.getElementById('error-msg');
    const loader = document.getElementById('loader');

    // Event Listeners
    btn.addEventListener('click', () => lookup(input.value.trim()));
    input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(input.value.trim()); });

    /**
     * Client-side Lookup: Searches the locally loaded cweData array
     */
    async function lookup(id) {
      // Clean the ID input
      id = id.toString().replace(/^cwe-?/i, '').trim();

      if (!id || !/^\d+$/.test(id)) {
        showError("that's not a number. numbers are the things with curves and lines.");
        return;
      }

      input.value = id;
      setLoading(true);

      // Artificial "drawing" delay for vibes (optional, remove if you want it instant)
      await new Promise(r => setTimeout(r, 400));

      // Search the locally loaded array instead of a backend API
      // Note: The GitHub JSON uses "ID" as a string, e.g., "79"
      const found = cweData.find(item => item.ID === id);

      if (found) {
        // Map the GitHub JSON fields to what your render function expects
        const formattedData = {
          id: found.ID,
          name: found.Name,
          description: found.Description || "No description provided.",
          abstraction: found.Abstraction || "N/A",
          status: found.Status || "N/A",
          // Construct the Mitre image URL directly
          image_url: found.Diagram ? `https://cwe.mitre.org${found.Diagram}` : null
        };
        render(formattedData);
      } else {
        showError(`CWE-${id} not found in the local database. It might not have a diagram or doesn't exist.`);
      }

      setLoading(false);
    }

    const captions = [
      "this is an actual official security diagram. we did not draw this.",
      "yes, this is what a multi-million dollar vulnerability looks like.",
      "the boxes represent boxes. the arrows represent arrows.",
      "it looked fine in visio, apparently.",
      "drawn by someone with a very specific idea of what 'intuitive' means.",
      "alt text: a diagram. of the weakness. yes.",
    ];

    function noImgHTML() {
      return '<div class="no-img-wrap">' +
        '<svg class="no-img-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">' +
        '<circle cx="50" cy="18" r="10" stroke="#1a1a1a" stroke-width="3" fill="none"/>' +
        '<line x1="50" y1="28" x2="50" y2="70" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>' +
        '<line x1="50" y1="42" x2="25" y2="58" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>' +
        '<line x1="50" y1="42" x2="75" y2="58" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>' +
        '<line x1="50" y1="70" x2="32" y2="95" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>' +
        '<line x1="50" y1="70" x2="68" y2="95" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>' +
        '</svg>' +
        '<p class="no-img-caption">no diagram available<br/>(the committee forgot to draw one)</p>' +
        '</div>';
    }

    function render(d) {
      errEl.style.display = 'none';
      const cap = captions[parseInt(d.id, 10) % captions.length];
      const imgHtml = d.image_url
        ? '<div class="panel-image"><img src="' + d.image_url + '" alt="diagram for CWE-' + d.id + '" onerror="this.parentElement.innerHTML=window._noImg()"/></div>'
        : '<div class="panel-image">' + noImgHTML() + '</div>';

      result.innerHTML =
        '<div class="panel">' +
        '<div class="panel-caption">' +
        '<span class="cwe-id">CWE-' + d.id + '</span>' +
        '<span class="cwe-name">' + d.name + '</span>' +
        '</div>' +
        imgHtml +
        '<div class="panel-desc">' +
        '<div class="desc-label">DESCRIPTION</div>' +
        '<p class="desc-body">' + d.description + '</p>' +
        '</div>' +
        '<div class="panel-alt">' +
        '<span>abstraction: ' + d.abstraction + '</span>' +
        '<span>status: ' + d.status + '</span>' +
        '<span class="meta-right">' + cap + '</span>' +
        '</div>' +
        '</div>';
    }

    window._noImg = noImgHTML;

    function showError(msg) { result.innerHTML = ''; errEl.textContent = msg; errEl.style.display = 'block'; }
    function setLoading(on) {
      loader.style.display = on ? 'block' : 'none';
      btn.disabled = on;
      if (on) { result.innerHTML = ''; errEl.style.display = 'none'; }
    }


  </script>
</body>

</html>
